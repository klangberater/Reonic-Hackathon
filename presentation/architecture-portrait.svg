<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Lumen architecture (portrait): tools do the math, the model does the words">
  <title>How Lumen works — tools do the math, the model does the words</title>
  <desc>Phone voice and screen talk to a TypeScript MCP server that owns every number; GPT-4o only does language; deterministic engines (scheduler, anomaly detection) run on a physically-simulated year of data.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="1920" fill="#0C1211"/>

  <text x="64" y="180" fill="#EAF0EC" font-size="58" font-weight="600">Tools do the math —</text>
  <text x="64" y="252" fill="#EAF0EC" font-size="58" font-weight="600">the model does the words</text>
  <text x="64" y="312" fill="#8B978F" font-size="29">Every figure comes from a tool, never the model.</text>

  <g stroke-linecap="round">
    <line x1="360" y1="590" x2="360" y2="650" stroke="#6B7770" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="360" y1="800" x2="360" y2="860" stroke="#6B7770" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="570" y1="955" x2="640" y2="955" stroke="#6B7770" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="320" y1="1050" x2="300" y2="1130" stroke="#34D399" stroke-opacity="0.6" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="470" y1="1050" x2="700" y2="1120" stroke="#34D399" stroke-opacity="0.6" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="360" y1="1420" x2="320" y2="1300" stroke="#6B7770" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="660" y1="1420" x2="760" y2="1310" stroke="#6B7770" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="150" y="440" width="420" height="150" rx="10" fill="#19221F" stroke="#2B352F" stroke-width="0.75"/>
    <text x="360" y="510" text-anchor="middle" fill="#EAF0EC" font-size="34">You</text>
    <text x="360" y="552" text-anchor="middle" fill="#8B978F" font-size="24">speak · see the plan</text>
  </g>

  <g>
    <rect x="150" y="650" width="420" height="150" rx="10" fill="#19221F" stroke="#2B352F" stroke-width="0.75"/>
    <text x="360" y="720" text-anchor="middle" fill="#EAF0EC" font-size="34">ElevenLabs</text>
    <text x="360" y="762" text-anchor="middle" fill="#8B978F" font-size="24">voice ↔ text</text>
  </g>

  <g>
    <rect x="150" y="860" width="420" height="190" rx="12" fill="#0F211B" stroke="#34D399" stroke-opacity="0.7" stroke-width="1.5"/>
    <text x="360" y="945" text-anchor="middle" fill="#34D399" font-size="34" font-weight="600">MCP server</text>
    <text x="360" y="990" text-anchor="middle" fill="#A9D9C7" font-size="24">owns every number</text>
  </g>

  <g>
    <rect x="640" y="880" width="370" height="150" rx="10" fill="#0E1B2B" stroke="#60A5FA" stroke-opacity="0.7" stroke-width="1.5"/>
    <text x="825" y="950" text-anchor="middle" fill="#60A5FA" font-size="32" font-weight="600">GPT-4o</text>
    <text x="825" y="992" text-anchor="middle" fill="#9CC2EE" font-size="24">words · intent only</text>
  </g>

  <g>
    <rect x="110" y="1130" width="380" height="170" rx="10" fill="#0F211B" stroke="#34D399" stroke-opacity="0.5" stroke-width="0.75"/>
    <text x="300" y="1205" text-anchor="middle" fill="#EAF0EC" font-size="30">Scheduler</text>
    <text x="300" y="1246" text-anchor="middle" fill="#8B978F" font-size="22">around committed loads</text>
  </g>

  <g>
    <rect x="560" y="1120" width="440" height="190" rx="10" fill="#0F211B" stroke="#34D399" stroke-opacity="0.95" stroke-width="2"/>
    <text x="780" y="1200" text-anchor="middle" fill="#EAF0EC" font-size="30" font-weight="500">Anomaly detection</text>
    <text x="780" y="1242" text-anchor="middle" fill="#A9D9C7" font-size="22">vs your home's own history</text>
  </g>

  <g>
    <rect x="220" y="1420" width="560" height="160" rx="10" fill="#19221F" stroke="#2B352F" stroke-width="0.75"/>
    <text x="500" y="1492" text-anchor="middle" fill="#EAF0EC" font-size="30">Simulated year of data</text>
    <text x="500" y="1534" text-anchor="middle" fill="#8B978F" font-size="22">15-min · energy balance ≈ 0</text>
  </g>

  <g>
    <rect x="150" y="1660" width="26" height="26" rx="5" fill="#0F211B" stroke="#34D399" stroke-opacity="0.8" stroke-width="1.5"/>
    <text x="190" y="1681" fill="#8B978F" font-size="26">deterministic tools — the numbers</text>
    <rect x="150" y="1716" width="26" height="26" rx="5" fill="#0E1B2B" stroke="#60A5FA" stroke-opacity="0.8" stroke-width="1.5"/>
    <text x="190" y="1737" fill="#8B978F" font-size="26">the model — words &amp; intent</text>
  </g>
</svg>
