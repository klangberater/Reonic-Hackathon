<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Lumen architecture (portrait): tools do the math, the model does the words">
  <title>How Lumen works — tools do the math, the model does the words</title>
  <desc>The phone talks only to a TypeScript MCP server, which owns every number and orchestrates ElevenLabs (voice) and GPT-4o (words); deterministic engines (scheduler, anomaly detection) run on a physically-simulated year of data.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="1920" fill="#0C1211"/>

  <text x="64" y="180" fill="#EAF0EC" font-size="58" font-weight="600">Tools do the math —</text>
  <text x="64" y="252" fill="#EAF0EC" font-size="58" font-weight="600">the model does the words</text>
  <text x="64" y="312" fill="#8B978F" font-size="29">The phone talks only to the server.</text>

  <g stroke-linecap="round">
    <line x1="360" y1="520" x2="360" y2="580" stroke="#6B7770" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="570" y1="640" x2="650" y2="605" stroke="#6B7770" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="570" y1="710" x2="650" y2="775" stroke="#60A5FA" stroke-opacity="0.6" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="320" y1="760" x2="300" y2="900" stroke="#34D399" stroke-opacity="0.6" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="450" y1="760" x2="730" y2="890" stroke="#34D399" stroke-opacity="0.6" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="360" y1="1190" x2="300" y2="1060" stroke="#6B7770" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="660" y1="1190" x2="780" y2="1070" stroke="#6B7770" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="150" y="380" width="420" height="140" rx="10" fill="#19221F" stroke="#2B352F" stroke-width="0.75"/>
    <text x="360" y="448" text-anchor="middle" fill="#EAF0EC" font-size="34">You</text>
    <text x="360" y="490" text-anchor="middle" fill="#8B978F" font-size="24">speak · see the plan</text>
  </g>

  <g>
    <rect x="150" y="580" width="420" height="180" rx="12" fill="#0F211B" stroke="#34D399" stroke-opacity="0.7" stroke-width="1.5"/>
    <text x="360" y="660" text-anchor="middle" fill="#34D399" font-size="34" font-weight="600">MCP server</text>
    <text x="360" y="704" text-anchor="middle" fill="#A9D9C7" font-size="24">owns every number · calls the AI</text>
  </g>

  <g>
    <rect x="650" y="540" width="360" height="130" rx="10" fill="#19221F" stroke="#2B352F" stroke-width="0.75"/>
    <text x="830" y="600" text-anchor="middle" fill="#EAF0EC" font-size="32">ElevenLabs</text>
    <text x="830" y="640" text-anchor="middle" fill="#8B978F" font-size="23">voice — STT · TTS</text>
  </g>

  <g>
    <rect x="650" y="710" width="360" height="130" rx="10" fill="#0E1B2B" stroke="#60A5FA" stroke-opacity="0.7" stroke-width="1.5"/>
    <text x="830" y="770" text-anchor="middle" fill="#60A5FA" font-size="32" font-weight="600">GPT-4o</text>
    <text x="830" y="810" text-anchor="middle" fill="#9CC2EE" font-size="23">words · intent only</text>
  </g>

  <g>
    <rect x="110" y="900" width="380" height="160" rx="10" fill="#0F211B" stroke="#34D399" stroke-opacity="0.5" stroke-width="0.75"/>
    <text x="300" y="975" text-anchor="middle" fill="#EAF0EC" font-size="30">Scheduler</text>
    <text x="300" y="1016" text-anchor="middle" fill="#8B978F" font-size="22">around committed loads</text>
  </g>

  <g>
    <rect x="560" y="890" width="440" height="180" rx="10" fill="#0F211B" stroke="#34D399" stroke-opacity="0.95" stroke-width="2"/>
    <text x="780" y="970" text-anchor="middle" fill="#EAF0EC" font-size="30" font-weight="500">Anomaly detection</text>
    <text x="780" y="1012" text-anchor="middle" fill="#A9D9C7" font-size="22">vs your home's own history</text>
  </g>

  <g>
    <rect x="220" y="1190" width="560" height="150" rx="10" fill="#19221F" stroke="#2B352F" stroke-width="0.75"/>
    <text x="500" y="1262" text-anchor="middle" fill="#EAF0EC" font-size="30">Simulated year of data</text>
    <text x="500" y="1304" text-anchor="middle" fill="#8B978F" font-size="22">15-min · energy balance ≈ 0</text>
  </g>

  <g>
    <rect x="150" y="1440" width="26" height="26" rx="5" fill="#0F211B" stroke="#34D399" stroke-opacity="0.8" stroke-width="1.5"/>
    <text x="190" y="1461" fill="#8B978F" font-size="26">tools — own the numbers</text>
    <rect x="150" y="1496" width="26" height="26" rx="5" fill="#0E1B2B" stroke="#60A5FA" stroke-opacity="0.8" stroke-width="1.5"/>
    <text x="190" y="1517" fill="#8B978F" font-size="26">the model — words</text>
    <rect x="150" y="1552" width="26" height="26" rx="5" fill="#19221F" stroke="#2B352F" stroke-width="1.5"/>
    <text x="190" y="1573" fill="#8B978F" font-size="26">voice &amp; data I/O</text>
  </g>
</svg>
