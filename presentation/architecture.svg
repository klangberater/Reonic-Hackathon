<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 620" width="1040" height="620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Lumen architecture: tools do the math, the model does the words">
  <title>How Lumen works — tools do the math, the model does the words</title>
  <desc>The phone talks only to a TypeScript backend, which owns every number and orchestrates ElevenLabs (voice) and GPT-4o (words); deterministic engines (scheduler, anomaly detection) run on a physically-simulated year of data.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="620" fill="#0C1211"/>

  <text x="48" y="58" fill="#EAF0EC" font-size="30" font-weight="600">Tools do the math — the model does the words</text>
  <text x="48" y="88" fill="#8B978F" font-size="16">The phone talks only to the server. Every figure comes from a tool, never the model.</text>

  <g stroke-linecap="round">
    <line x1="200" y1="296" x2="288" y2="296" stroke="#6B7770" stroke-width="1.4" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="532" y1="272" x2="656" y2="252" stroke="#6B7770" stroke-width="1.4" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="532" y1="332" x2="656" y2="360" stroke="#60A5FA" stroke-opacity="0.6" stroke-width="1.4" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="392" y1="360" x2="330" y2="416" stroke="#34D399" stroke-opacity="0.6" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="430" y1="360" x2="556" y2="410" stroke="#34D399" stroke-opacity="0.6" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="392" y1="540" x2="330" y2="512" stroke="#6B7770" stroke-width="1.4" marker-end="url(#arrow)"/>
    <line x1="548" y1="540" x2="560" y2="518" stroke="#6B7770" stroke-width="1.4" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="44" y="250" width="156" height="92" rx="6" fill="#19221F" stroke="#2B352F" stroke-width="0.5"/>
    <text x="122" y="290" text-anchor="middle" fill="#EAF0EC" font-size="18">You</text>
    <text x="122" y="314" text-anchor="middle" fill="#8B978F" font-size="13">speak · see the plan</text>
  </g>

  <g>
    <rect x="288" y="232" width="244" height="128" rx="8" fill="#0F211B" stroke="#34D399" stroke-opacity="0.7" stroke-width="1"/>
    <text x="410" y="284" text-anchor="middle" fill="#34D399" font-size="20" font-weight="600">Backend · TypeScript</text>
    <text x="410" y="310" text-anchor="middle" fill="#A9D9C7" font-size="13">owns every number · calls the AI</text>
  </g>

  <g>
    <rect x="656" y="212" width="200" height="80" rx="6" fill="#19221F" stroke="#2B352F" stroke-width="0.5"/>
    <text x="756" y="248" text-anchor="middle" fill="#EAF0EC" font-size="17">ElevenLabs</text>
    <text x="756" y="270" text-anchor="middle" fill="#8B978F" font-size="13">voice — STT · TTS</text>
  </g>

  <g>
    <rect x="656" y="320" width="200" height="80" rx="6" fill="#0E1B2B" stroke="#60A5FA" stroke-opacity="0.7" stroke-width="1"/>
    <text x="756" y="356" text-anchor="middle" fill="#60A5FA" font-size="17" font-weight="600">GPT-4o</text>
    <text x="756" y="378" text-anchor="middle" fill="#9CC2EE" font-size="13">words · intent only</text>
  </g>

  <g>
    <rect x="230" y="416" width="196" height="92" rx="6" fill="#0F211B" stroke="#34D399" stroke-opacity="0.5" stroke-width="0.5"/>
    <text x="328" y="452" text-anchor="middle" fill="#EAF0EC" font-size="16">Scheduler</text>
    <text x="328" y="476" text-anchor="middle" fill="#8B978F" font-size="13">around committed loads</text>
  </g>

  <g>
    <rect x="446" y="410" width="232" height="104" rx="6" fill="#0F211B" stroke="#34D399" stroke-opacity="0.95" stroke-width="1.4"/>
    <text x="562" y="450" text-anchor="middle" fill="#EAF0EC" font-size="16" font-weight="500">Anomaly detection</text>
    <text x="562" y="474" text-anchor="middle" fill="#A9D9C7" font-size="13">vs your home's own history</text>
  </g>

  <g>
    <rect x="280" y="540" width="340" height="66" rx="6" fill="#19221F" stroke="#2B352F" stroke-width="0.5"/>
    <text x="450" y="572" text-anchor="middle" fill="#EAF0EC" font-size="16">Simulated year of data</text>
    <text x="450" y="594" text-anchor="middle" fill="#8B978F" font-size="13">15-min · energy balance ≈ 0</text>
  </g>

  <g>
    <rect x="724" y="436" width="14" height="14" rx="3" fill="#0F211B" stroke="#34D399" stroke-opacity="0.8" stroke-width="1"/>
    <text x="746" y="447" fill="#8B978F" font-size="13">tools — own the numbers</text>
    <rect x="724" y="466" width="14" height="14" rx="3" fill="#0E1B2B" stroke="#60A5FA" stroke-opacity="0.8" stroke-width="1"/>
    <text x="746" y="477" fill="#8B978F" font-size="13">the model — words</text>
    <rect x="724" y="496" width="14" height="14" rx="3" fill="#19221F" stroke="#2B352F" stroke-width="1"/>
    <text x="746" y="507" fill="#8B978F" font-size="13">voice &amp; data I/O</text>
  </g>
</svg>
