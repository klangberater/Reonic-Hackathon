name: Lumen
options:
  bundleIdPrefix: ai.getfletcher
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_VERSION: "5.0"            # Swift 5 language mode — avoids strict-concurrency churn during the hackathon
    INFOPLIST_KEY_CFBundleDisplayName: "Lumen"
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO    # only standard HTTPS → skip the compliance gate
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"

targets:
  Lumen:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.getfletcher.lumen
        TARGETED_DEVICE_FAMILY: "1"   # iPhone
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: B7RGVXV5VT
