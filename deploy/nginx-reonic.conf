# EXACT nginx change for getfletcher.ai (verified against the live server 2026-06-20).
# The proxy is nginx with Certbot TLS at /etc/letsencrypt/live/getfletcher.ai/.
# The getfletcher.ai server block currently routes /api/ to theo's backend on :8002.
#
# To take over the route, edit /etc/nginx/sites-available/getfletcher.ai and change the
# `location /api/` proxy_pass from 8002 to our Node backend on 8090, adding SSE-friendly
# settings (streaming /chat). Then: `sudo nginx -t && sudo systemctl reload nginx`.
#
# Replace the existing `location /api/ { proxy_pass http://127.0.0.1:8002/; ... }` with:

location /api/ {
    proxy_pass http://127.0.0.1:8090/;        # our Reonic Node backend (/api/ stripped)
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # SSE streaming for /chat: disable buffering, keep connections open
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
}

# iOS base URL becomes:  https://getfletcher.ai/api
# nginx strips the /api/ prefix, so backend routes are /health, /state, /chat (no /api prefix).
# The old `root /opt/fletcher/frontend/dist;` at `/` can stay (harmless) or be replaced later.
