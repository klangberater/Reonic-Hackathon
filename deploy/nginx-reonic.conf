# nginx route for the Reonic backend — add inside the existing getfletcher.ai
# `server { listen 443 ssl; ... }` block (reuses the existing TLS cert), then
# `sudo nginx -t && sudo nginx -s reload`.
#
# Option A (take over the root, since the old project is being replaced):
location / {
    proxy_pass http://127.0.0.1:8090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # SSE (streaming /chat): don't buffer, keep the connection open
    proxy_buffering off;
    proxy_read_timeout 300s;
}

# Option B (path prefix, if keeping other apps): use `location /reonic/ { ... }`
# and have the backend mount its routes under /reonic. iOS base URL then ends in /reonic.
